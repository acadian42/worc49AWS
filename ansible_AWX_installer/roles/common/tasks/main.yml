---
# ---- Guest assertions ------------------------------------------------------
- name: Assert guest is Ubuntu 24.04
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_version is version("24.04", ">=")
    fail_msg: "Guest must be Ubuntu 24.04 (detected {{ ansible_distribution }} {{ ansible_distribution_version }})"
    success_msg: "Guest is {{ ansible_distribution }} {{ ansible_distribution_version }}"

- name: Determine free space on /
  ansible.builtin.set_fact:
    root_free_gb: >-
      {{ ((ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first | default(0))
          / (1024 * 1024 * 1024)) | round(1) }}

- name: Assert sufficient guest disk
  ansible.builtin.assert:
    that:
      - root_free_gb | float >= common_required_free_gb | float
    fail_msg: "Need >= {{ common_required_free_gb }} GiB free on / (have {{ root_free_gb }} GiB)"
    success_msg: "Guest free disk on /: {{ root_free_gb }} GiB"

# ---- Packages --------------------------------------------------------------
- name: Update apt cache (safe, time-bounded)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

# ---- Swap off (kubelet preference) -----------------------------------------
- name: Read active swap
  ansible.builtin.command: cat /proc/swaps
  register: common_swaps
  changed_when: false

- name: Disable swap now
  ansible.builtin.command: swapoff -a
  when: common_swaps.stdout_lines | length > 1
  changed_when: common_swaps.stdout_lines | length > 1

- name: Comment swap entries in /etc/fstab (persist across reboot)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(?!#)(\S+\s+\S+\s+swap\s+.*)$'
    replace: '# \1'

# ---- Kernel modules + sysctls ---------------------------------------------
- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/awx-k3s.conf
    content: "{{ common_kernel_modules | join('\n') }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Load kernel modules now
  ansible.builtin.command: "modprobe {{ item }}"
  loop: "{{ common_kernel_modules }}"
  register: common_modprobe
  changed_when: false
  failed_when: common_modprobe.rc != 0

- name: Write sysctls for K3s/AWX
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-awx-k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
      fs.inotify.max_user_instances       = 512
      fs.inotify.max_user_watches         = 524288
  register: common_sysctl_file

- name: Apply sysctls
  ansible.builtin.command: sysctl --system
  when: common_sysctl_file.changed
  changed_when: common_sysctl_file.changed

# ---- Time sync -------------------------------------------------------------
- name: Ensure time synchronization is active
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  register: common_timesync
  failed_when: false
