---
# ---- Detect current K3s ----------------------------------------------------
- name: Check installed K3s version
  ansible.builtin.command: k3s --version
  register: k3s_cur
  changed_when: false
  failed_when: false

- name: Set k3s_present fact
  ansible.builtin.set_fact:
    k3s_present: "{{ (k3s_cur.rc == 0) and (k3s_version in k3s_cur.stdout) }}"

- name: Report K3s state
  ansible.builtin.debug:
    msg: "K3s present at pinned version: {{ k3s_present }} (want {{ k3s_version }})"

# ---- Persistent configuration (disable traefik/servicelb) ------------------
- name: Ensure /etc/rancher/k3s exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write K3s config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0644"
  register: k3s_config

# ---- Install (download first, then execute; verifies the binary checksum) --
- name: Download the official K3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: "{{ k3s_install_script }}"
    mode: "0755"
    force: true
  when: not k3s_present

- name: Sanity-check the downloaded install script is a shell script
  ansible.builtin.command: "head -c 256 {{ k3s_install_script }}"
  register: k3s_script_head
  changed_when: false
  failed_when: "'/bin/sh' not in k3s_script_head.stdout and '/bin/bash' not in k3s_script_head.stdout"
  when: not k3s_present

- name: Install K3s (pinned version; installer verifies the binary sha256)
  ansible.builtin.command: "sh {{ k3s_install_script }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_SKIP_START: "false"
  register: k3s_install
  changed_when: "'systemd' in k3s_install.stdout or 'Starting' in k3s_install.stdout"
  when: not k3s_present

# ---- Restart on config change (when already installed) ---------------------
- name: Restart K3s if config changed
  ansible.builtin.systemd:
    name: k3s
    state: restarted
    enabled: true
  when: k3s_config.changed and k3s_present

- name: Ensure K3s service is enabled and started
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true

# ---- Wait for readiness ----------------------------------------------------
- name: Wait for node to report Ready
  ansible.builtin.command: k3s kubectl get nodes --no-headers
  register: k3s_nodes
  until: k3s_nodes.stdout is search(' Ready ')
  retries: "{{ k3s_node_wait_retries }}"
  delay: "{{ k3s_node_wait_delay }}"
  changed_when: false

- name: Confirm default local-path StorageClass exists
  ansible.builtin.command: k3s kubectl get storageclass local-path
  register: k3s_sc
  until: k3s_sc.rc == 0
  retries: 10
  delay: 6
  changed_when: false

- name: Show node status
  ansible.builtin.debug:
    msg: "{{ k3s_nodes.stdout_lines }}"
