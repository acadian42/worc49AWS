[defaults]
# Inventory generated from `vagrant ssh-config` (transient host/port/key).
inventory = inventory/generated/hosts.ini
roles_path = roles
collections_path = .ansible/collections
host_key_checking = False
retry_files_enabled = False
display_skipped_hosts = True
interpreter_python = auto_silent
# Keep facts gathering on (we assert on them) but cache for speed across reruns.
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .cache/facts
fact_caching_timeout = 3600
nocows = True
forks = 10

[ssh_connection]
# ControlPersist makes the many guest tasks fast and resilient.
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o ConnectTimeout=20
pipelining = True
scp_if_ssh = smart

[privilege_escalation]
become = True
become_method = sudo
become_user = root
