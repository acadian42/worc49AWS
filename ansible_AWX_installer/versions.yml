---
# =============================================================================
# Authoritative pinned versions for the ansible_AWX_installer project.
#
# These are the TESTED defaults. scripts/resolve-versions.sh queries the live
# upstream APIs and writes the freshly-resolved values to
# .cache/versions.resolved.yml for comparison, but the pins below are what the
# build actually uses unless AWX_ALLOW_VERSION_DRIFT=1 is set.
#
# Human-readable rationale lives in docs/decisions.md.
# NOTE: This file MUST NOT contain any secret material.
# =============================================================================

meta:
  resolved_at: "2026-06-24"       # date these defaults were verified live
  resolved_by: "manual + scripts/resolve-versions.sh"

# ---- Host prerequisites (verified, not installed by this project) ----------
host:
  vmware_workstation_min: "17.5.0"   # 25.0.1 present on the build host
  vagrant_min: "2.4.0"               # 2.4.9 present on the build host

# ---- Vagrant / VMware integration ------------------------------------------
vagrant:
  vmware_utility_version: "1.0.24"
  vmware_desktop_plugin_version: "3.0.5"   # must be >= 1.0.0
  box: "bento/ubuntu-24.04"
  box_version: "202510.26.0"               # has a vmware_desktop provider (amd64)

# ---- Control environment (.venv) -------------------------------------------
ansible:
  core_version: "2.18.6"            # reconciled to the exact installed version at bootstrap
  lint_version: "24.12.2"
  yamllint_version: "1.35.1"

# ---- Guest OS --------------------------------------------------------------
guest:
  ubuntu_version: "24.04"
  ubuntu_codename: "noble"

# ---- Kubernetes (K3s single node) ------------------------------------------
k3s:
  version: "v1.35.5+k3s1"          # K3s "stable" channel; embeds Kubernetes 1.35.5
  # Descending compatibility matrix, tried in order if AWX fails to reconcile
  # for a Kubernetes-API reason. The newest one that passes is recorded back here.
  fallback_versions:
    - "v1.34.9+k3s1"
    - "v1.33.5+k3s1"

# ---- AWX -------------------------------------------------------------------
awx:
  operator_version: "2.19.1"               # latest tagged awx-operator release
  operator_image: "quay.io/ansible/awx-operator"
  awx_version: "24.6.1"                     # AWX bundled with operator 2.19.1
  namespace: "awx"
  resource_name: "awx"
  admin_user: "admin"
  nodeport: 30080
  postgres_storage: "8Gi"
  postgres_storage_class: "local-path"
  # Explicit image pins so NOTHING floats. The operator's own defaults float
  # postgres to ":latest"; image_version pins awx/awx-ee/init; we pin the rest.
  awx_image: "quay.io/ansible/awx"                              # tag = awx_version
  ee_image: "quay.io/ansible/awx-ee:24.6.1"
  redis_image: "docker.io/redis"
  redis_image_version: "7.4.9"
  postgres_image: "quay.io/sclorg/postgresql-15-c9s"
  postgres_image_version: "20260617"                            # date-stamped pg15 build
  # CentOS Stream 9 is a rolling tag -> pinned by digest (used by project-init).
  init_projects_image: "quay.io/centos/centos@sha256:5665c076f25172d372d6fb7934f49f9f99b36aa6117afd1935186ccb9fb88cb0"

# ---- kube-rbac-proxy remediation -------------------------------------------
# operator 2.19.1 references gcr.io/kubebuilder/kube-rbac-proxy:v0.15.0, which is
# DISCONTINUED (HTTP 404 -> ImagePullBackOff). It is replaced via a local Kustomize
# image override with the upstream-maintained brancz image, pinned by digest.
kube_rbac_proxy:
  old_image: "gcr.io/kubebuilder/kube-rbac-proxy:v0.15.0"
  new_image: "quay.io/brancz/kube-rbac-proxy"
  new_tag: "v0.22.0"
  new_digest: "sha256:53d5a3911ac076d000c92362d4939a3147ba21f231edf82926c82d16dbdd8850"
