---
# ============================================================================
# VAGRANT LAB INVENTORY (functional profile: 3 ES + 2 recorders + 1 LDAP).
# Lab-only VALUES live here/in group_vars; production LOGIC stays in roles.
# The Vagrantfile keeps these IPs in sync with the VMs it creates.
# ============================================================================
all:
  children:
    all_fpc_hosts:
      children:
        elasticsearch_physical_hosts:
          hosts:
            es-phys-01:
              ansible_host: 172.28.10.11
              management_ip: 172.28.10.11
              physical_host: es-phys-01
              es_data_devices: []          # lab uses a directory on the VM disk
            es-phys-02:
              ansible_host: 172.28.10.12
              management_ip: 172.28.10.12
              physical_host: es-phys-02
              es_data_devices: []
            es-phys-03:
              ansible_host: 172.28.10.13
              management_ip: 172.28.10.13
              physical_host: es-phys-03
              es_data_devices: []
        arkime_recorders:
          hosts:
            arkime-rec-01:
              ansible_host: 172.28.10.21
              management_ip: 172.28.10.21
              physical_host: arkime-rec-01
              management_interface: eth1
              capture_interfaces: ["eth2"]
              nginx_server_name: rec01.lab.local
            arkime-rec-02:
              ansible_host: 172.28.10.22
              management_ip: 172.28.10.22
              physical_host: arkime-rec-02
              management_interface: eth1
              capture_interfaces: ["eth2"]
              nginx_server_name: rec02.lab.local
    ldap_test_services:
      hosts:
        ldap-test-01:
          ansible_host: 172.28.10.31
          management_ip: 172.28.10.31
  vars:
    ansible_user: vagrant
    ansible_python_interpreter: /usr/bin/python3
