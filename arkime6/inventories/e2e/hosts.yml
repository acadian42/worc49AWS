---
# E2E smoke inventory. Two PHYSICAL hosts; ES containers are derived by the role.
# ansible_host resolves to each host's NAT eth0 IP (management_ip), written by
# tests/e2e/discover_ips.sh after `vagrant up` (the AWX VM reaches these over
# vmnet8). Lab variable values live in group_vars/ and host_vars/.
all:
  children:
    all_fpc_hosts:
      children:
        elasticsearch_physical_hosts:
          hosts:
            fpc-e2e-es-01:
              ansible_host: "{{ management_ip }}"
        arkime_recorders:
          hosts:
            fpc-e2e-rec-01:
              ansible_host: "{{ management_ip }}"
  vars:
    ansible_user: vagrant
    ansible_python_interpreter: /usr/bin/python3
