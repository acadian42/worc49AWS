---
# ============================================================================
# E2E Elasticsearch contract (LAB values). ONE physical failure domain only:
# this does NOT validate cross-host shard awareness or HA. Replicas are 0 and a
# single master-eligible node is used precisely because there is one ES host.
# ============================================================================

es_cluster_name: fpc-es-e2e

# Density under test: 3 containers on the single ES host.
elasticsearch_nodes_per_host: 3
es_master_eligible_hosts:
  - fpc-e2e-es-01          # single failure domain -> exactly 1 master-eligible
es_dedicated_masters: false
es_coordinating_nodes: 0

# Memory sizing (lab): 10 GiB VM, reserve 2 -> ~2.6 GiB/container, ~1 GiB heap.
os_docker_reserve_gib: 2
es_heap_fraction: 0.5
es_heap_max_gib: 1
es_min_container_gib: 2

# Ports (host networking, unique per node).
es_http_base_port: 9200
es_transport_base_port: 9300
es_bind_host: "0.0.0.0"
es_publish_host: "{{ management_ip }}"

# Storage: bind-mounted directories on the VM disk (no dedicated block device).
es_data_path: "{{ es_base }}/data"
es_logs_path: "{{ es_base }}/logs"
es_config_path: "{{ es_base }}/config"
es_data_devices: []
es_fs_type: xfs
es_mount_opts: "noatime,nodiratime"
es_uid: 1000
es_gid: 1000
es_snapshot_repo_path: "{{ es_base }}/snapshots"
es_disk_watermark_low: "85%"
es_disk_watermark_high: "90%"
es_disk_watermark_flood: "97%"

# Index / shard / awareness (LAB: 0 replicas on a single host).
es_index_replicas: 0
es_index_shards: 3
# Single failure domain -> exactly one master-eligible node (validation override).
validation_expected_masters: 1
es_awareness_attribute: physical_host
es_awareness_force_values: "fpc-e2e-es-01"      # single zone, trivially satisfied
es_spi_retention_days: 7
es_history_retention_days: 14

# JVM / GC — ABSOLUTE container paths. Relative paths break the JVM heap-sizing
# probe ("Error opening log file 'logs/gc.log': No such file or directory").
es_gc_collector: g1
es_heap_dump_path: "/usr/share/elasticsearch/data"
es_gc_log_path: "/usr/share/elasticsearch/logs/gc.log"

# Bootstrap guard
es_bootstrap_marker: "{{ es_base }}/.bootstrapped"

# Security (native realm + transport TLS exercised; HTTP TLS OFF for the lab).
# LAB REDUCTION: es_http_tls=false avoids a cross-job CA-consistency problem under
# AWX (the internal CA is generated on the EPHEMERAL EE pod per job, so the CA in
# the ES-deploy job differs from later jobs). Transport TLS (mandatory with
# security on a multi-node cluster) stays ON; native-realm auth + "anonymous
# denied" still hold over HTTP. Production keeps es_http_tls=true; the underlying
# ephemeral-CA defect is documented in docs/e2e-test-report.md.
es_security_enabled: true
es_transport_tls: true
es_http_tls: false
es_bootstrap_password: "{{ vault_es_bootstrap_password }}"
es_arkime_writer_password: "{{ vault_es_arkime_writer_password }}"

# Host system limits
es_vm_max_map_count: 262144
es_vm_swappiness: 1
es_ulimit_memlock: "-1"
es_ulimit_nofile: 65536
