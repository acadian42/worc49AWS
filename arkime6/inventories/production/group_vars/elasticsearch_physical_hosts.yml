---
# ============================================================================
# ELASTICSEARCH VARIABLE CONTRACT (per physical host group).
# Ansible derives the per-container node list from these — containers are NOT
# inventory hosts. Sizing math: see docs/sizing.md and plan §8.
# ============================================================================

es_cluster_name: fpc-es

# ---- Density (the benchmarked decision; default 3) ---------------------------
elasticsearch_nodes_per_host: 3            # 3 | 4 | 5  -> 15 | 20 | 25 total nodes
es_master_eligible_hosts:                  # exactly 3, on 3 distinct failure domains
  - es-phys-01
  - es-phys-02
  - es-phys-03
es_dedicated_masters: false                # true => tiny dedicated master + (N-1) data per master host
es_coordinating_nodes: 0                   # add coordinating-only nodes only if benchmark shows need

# ---- Memory / heap sizing (125 GiB hosts) ------------------------------------
os_docker_reserve_gib: 13                  # OS + Docker + agents reserve
es_heap_fraction: 0.5                      # heap = 50% of container memory limit
es_heap_max_gib: 26                        # compressed-oops ceiling
# Derived per-node values are computed in the elasticsearch_cluster role from the
# above (see role defaults/templates); do not hardcode heap in templates.

# ---- Ports (host networking, unique per node) --------------------------------
es_http_base_port: 9200
es_transport_base_port: 9300
es_bind_host: "0.0.0.0"
es_publish_host: "{{ management_ip }}"     # set per host in host_vars

# ---- Storage -----------------------------------------------------------------
es_data_path: "{{ es_base }}/data"
es_logs_path: "{{ es_base }}/logs"
es_config_path: "{{ es_base }}/config"
es_data_devices: []                        # e.g. ['/dev/nvme0n1']; set in host_vars
es_fs_type: xfs
es_mount_opts: "noatime,nodiratime"
es_uid: 1000
es_gid: 1000
es_snapshot_repo_path: "{{ es_base }}/snapshots"
es_disk_watermark_low: "85%"
es_disk_watermark_high: "90%"
es_disk_watermark_flood: "95%"

# ---- Index / shard / ILM -----------------------------------------------------
es_index_replicas: 1
es_index_shards: 12                        # ~1 per data node at N=3 (15 nodes, 12 data); tune via worksheet
es_awareness_attribute: physical_host
es_awareness_force_values: "es-phys-01,es-phys-02,es-phys-03,es-phys-04,es-phys-05"

# ---- Retention (placeholders — confirm in worksheet) -------------------------
es_spi_retention_days: 30
es_history_retention_days: 90

# ---- JVM / GC ----------------------------------------------------------------
es_gc_collector: g1
# Absolute container paths — relative paths break the JVM heap-sizing probe.
es_heap_dump_path: "/usr/share/elasticsearch/data"
es_gc_log_path: "/usr/share/elasticsearch/logs/gc.log"

# ---- Bootstrap guard ---------------------------------------------------------
es_bootstrap_marker: "{{ es_base }}/.bootstrapped"

# ---- Security ----------------------------------------------------------------
es_security_enabled: true
es_transport_tls: true
es_http_tls: true
es_bootstrap_password: "{{ vault_es_bootstrap_password | default('') }}"
es_arkime_writer_password: "{{ vault_es_arkime_writer_password | default('') }}"

# ---- System limits (host-level; applied by common role) ----------------------
es_vm_max_map_count: 262144
es_vm_swappiness: 1
es_ulimit_memlock: "-1"
es_ulimit_nofile: 65536
