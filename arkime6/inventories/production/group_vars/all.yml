---
# ============================================================================
# GLOBAL VARIABLE CONTRACT — applies to all FPC hosts.
# Secrets are referenced as vault_* and live in an Ansible Vault file or are
# injected by AWX credentials. NEVER put secret values in this file.
# All versions/digests verified 2026-06-24 (see docs/_sources/).
# ============================================================================

# ---- Supported OS matrix -----------------------------------------------------
supported_os_matrix:
  - {family: Debian, distribution: Ubuntu, versions: ["24.04"]}
  - {family: RedHat, distribution: Rocky, versions: ["9"]}    # secondary; Ubuntu is primary
fpc_primary_os: "Ubuntu 24.04 LTS"

# ---- Time / name resolution --------------------------------------------------
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
dns_servers:
  - 192.0.2.53          # EXAMPLE — override in production host/group vars
chrony_max_offset_seconds: 1

# ---- Image delivery model (answers "build on VM, ship to hosts") --------------
# load_from_archive: pull/build on the AWX/build host, docker save -> ship -> docker load.
# registry:          hosts pull pinned digests from a private registry.
image_delivery_mode: load_from_archive       # load_from_archive | registry
image_archive_dir: /opt/fpc/images           # where tar.gz images are staged on hosts
registry_url: ""                             # set when image_delivery_mode=registry
registry_username: ""                        # injected by AWX registry credential
registry_password: "{{ vault_registry_password | default('') }}"
air_gapped: false

# ---- Pinned container images (digest-pinned in production) --------------------
arkime_version: "v6.5.0"
arkime_image_repo: "ghcr.io/arkime/arkime/arkime"
# Multi-arch manifest-list digest for v6.5.0 (verify/re-resolve at pull time):
arkime_image_digest: "sha256:083fc1af41bcad021eeb6b9cc630e26adae35690106d35e5193e4e8442895c66"
arkime_image: "{{ arkime_image_repo }}@{{ arkime_image_digest }}"

es_version: "8.19.17"
es_image_repo: "docker.elastic.co/elasticsearch/elasticsearch"
es_image_digest: ""        # CHANGEME: resolve with `docker buildx imagetools inspect <repo>:<ver>`
es_image: "{{ es_image_repo }}{{ (':' + es_version) if es_image_digest == '' else ('@' + es_image_digest) }}"

nginx_image_repo: "nginx"
nginx_version: "1.27-alpine"
nginx_image_digest: ""     # CHANGEME: resolve and pin
nginx_image: "{{ nginx_image_repo }}{{ (':' + nginx_version) if nginx_image_digest == '' else ('@' + nginx_image_digest) }}"

ldap_auth_image_repo: "caltechads/nginx-ldap-auth-service"
ldap_auth_version: "2.6.2"
ldap_auth_image_digest: ""  # CHANGEME: resolve and pin
ldap_auth_image: "{{ ldap_auth_image_repo }}{{ (':' + ldap_auth_version) if ldap_auth_image_digest == '' else ('@' + ldap_auth_image_digest) }}"

# Complete set used by docker_engine for save/load and validation:
fpc_all_images:
  - "{{ arkime_image }}"
  - "{{ es_image }}"
  - "{{ nginx_image }}"
  - "{{ ldap_auth_image }}"

# ---- Docker engine -----------------------------------------------------------
docker_compose_min_version: "2.18.0"
docker_log_driver: local            # rotating defaults (20m x 5, compressed); json-file does NOT rotate
docker_log_options:
  max-size: "20m"
  max-file: "5"
docker_daemon_options:
  live-restore: true
  log-driver: "{{ docker_log_driver }}"

# ---- Base filesystem layout (version-anchored) -------------------------------
fpc_base: /fpc
es_base: "{{ fpc_base }}/es8"
arkime_base: "{{ fpc_base }}/arkime6"

# ---- Internal PKI ------------------------------------------------------------
internal_ca_enabled: true
internal_ca_dir: "{{ fpc_base }}/pki"
internal_ca_cn: "FPC Internal CA"
internal_ca_key_passphrase: "{{ vault_internal_ca_key_passphrase | default('') }}"
tls_cert_validity_days: 825

# ---- Host firewall -----------------------------------------------------------
firewall_enabled: true
firewall_manager: ufw               # ufw (Ubuntu) | firewalld (RHEL)
control_plane_cidrs:
  - 192.0.2.0/24                     # EXAMPLE — AWX/control subnet; override
analyst_cidrs:
  - 198.51.100.0/24                  # EXAMPLE — users allowed to reach Nginx 443

# ---- Destructive-action master guard (opt-in only) ---------------------------
confirm_destroy: false
arkime_force_init: false
