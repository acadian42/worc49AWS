              capture_interfaces: ["eth1"]
              nginx_server_name: rec03.fpc.example.com
            arkime-rec-04:
              ansible_host: 192.0.2.24
              management_ip: 192.0.2.24
              physical_host: arkime-rec-04
              management_interface: eth0
              capture_interfaces: ["eth1"]
              nginx_server_name: rec04.fpc.example.com
            arkime-rec-05:
