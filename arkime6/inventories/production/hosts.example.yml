# ============================================================================
# PRODUCTION INVENTORY EXAMPLE — copy to hosts.yml and fill in real values.
# Describes PHYSICAL hosts only. ES containers are derived by Ansible.
# No real credentials or production addresses here.
# ============================================================================
all:
  children:
    all_fpc_hosts:
      children:
        elasticsearch_physical_hosts:
          hosts:
            es-phys-01:
              ansible_host: 192.0.2.11
              management_ip: 192.0.2.11
              physical_host: es-phys-01
              es_data_devices: ["/dev/nvme0n1"]
            es-phys-02:
              ansible_host: 192.0.2.12
              management_ip: 192.0.2.12
              physical_host: es-phys-02
              es_data_devices: ["/dev/nvme0n1"]
            es-phys-03:
              ansible_host: 192.0.2.13
              management_ip: 192.0.2.13
              physical_host: es-phys-03
              es_data_devices: ["/dev/nvme0n1"]
            es-phys-04:
              ansible_host: 192.0.2.14
              management_ip: 192.0.2.14
              physical_host: es-phys-04
              es_data_devices: ["/dev/nvme0n1"]
            es-phys-05:
              ansible_host: 192.0.2.15
              management_ip: 192.0.2.15
              physical_host: es-phys-05
              es_data_devices: ["/dev/nvme0n1"]
        arkime_recorders:
          hosts:
            arkime-rec-01:
              ansible_host: 192.0.2.21
              management_ip: 192.0.2.21
              physical_host: arkime-rec-01
