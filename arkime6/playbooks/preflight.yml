---
# ============================================================================
# Read-only preflight. ASSERTS environment readiness across the whole fleet
# WITHOUT mutating anything. Run before any deploy; safe to run anytime.
# ============================================================================

- name: Preflight readiness checks across all FPC hosts
  hosts: all_fpc_hosts
  become: true
  gather_facts: true
  tags:
    - preflight
  tasks:
    - name: Assert the host OS is in the supported matrix
      ansible.builtin.assert:
        that:
          - >-
            supported_os_matrix
            | selectattr('distribution', 'equalto', ansible_distribution)
            | selectattr('versions', 'contains', ansible_distribution_major_version | string)
            | list | length > 0
            or supported_os_matrix
            | selectattr('distribution', 'equalto', ansible_distribution)
            | selectattr('versions', 'contains', ansible_distribution_version | string)
            | list | length > 0
        fail_msg: >-
          {{ ansible_distribution }} {{ ansible_distribution_version }} is not in the
          supported OS matrix ({{ supported_os_matrix | map(attribute='distribution') | join(', ') }}).
        success_msg: "OS {{ ansible_distribution }} {{ ansible_distribution_version }} is supported."

    - name: Assert total memory is within a sane range
      ansible.builtin.assert:
        that:
          - ansible_memtotal_mb | int >= 2048
        fail_msg: "Only {{ ansible_memtotal_mb }} MiB RAM detected — below the 2 GiB sanity floor."
        success_msg: "Detected {{ ansible_memtotal_mb }} MiB RAM."

    - name: Stat the Elasticsearch data devices
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ es_data_devices | default([]) }}"
      register: es_device_stat
      when: "'elasticsearch_physical_hosts' in group_names"

    - name: Assert each Elasticsearch data device exists as a block device
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isblk | default(false)
        fail_msg: "Configured ES data device {{ item.item }} is missing or not a block device."
        success_msg: "ES data device {{ item.item }} is present."
      loop: "{{ es_device_stat.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - "'elasticsearch_physical_hosts' in group_names"
        - es_data_devices | default([]) | length > 0

    - name: Assert there is enough RAM per Elasticsearch container for the chosen density
      ansible.builtin.assert:
        that:
          - >-
            (((ansible_memtotal_mb | int) / 1024 | int) - (os_docker_reserve_gib | int))
            / (elasticsearch_nodes_per_host | int) >= (es_min_container_gib | int)
        fail_msg: >-
          ({{ (ansible_memtotal_mb / 1024) | round(0, 'floor') | int }} GiB - {{ os_docker_reserve_gib }} GiB reserve)
          / {{ elasticsearch_nodes_per_host }} nodes is below es_min_container_gib={{ es_min_container_gib }} GiB.
        success_msg: "RAM is sufficient for {{ elasticsearch_nodes_per_host }} ES containers."
      when: "'elasticsearch_physical_hosts' in group_names"

    - name: Assert the management interface exists on recorders
      ansible.builtin.assert:
        that:
          - management_interface in ansible_interfaces
        fail_msg: "Management interface {{ management_interface }} not found in {{ ansible_interfaces }}."
        success_msg: "Management interface {{ management_interface }} present."
      when: "'arkime_recorders' in group_names"

    - name: Assert each capture interface exists on recorders
      ansible.builtin.assert:
        that:
          - item in ansible_interfaces
        fail_msg: "Capture interface {{ item }} not found in {{ ansible_interfaces }}."
        success_msg: "Capture interface {{ item }} present."
      loop: "{{ capture_interfaces | default([]) }}"
      when: "'arkime_recorders' in group_names"

    - name: Assert capture threads do not exceed the available CPU cores on recorders
      ansible.builtin.assert:
        that:
          - (capture_threads | int) <= (host_cpu_cores | default(ansible_processor_vcpus) | int)
        fail_msg: >-
          capture_threads={{ capture_threads }} exceeds available cores
          ({{ host_cpu_cores | default(ansible_processor_vcpus) }}).
        success_msg: "capture_threads={{ capture_threads }} fits within available cores."
      when: "'arkime_recorders' in group_names"

    - name: Probe NTP reachability for each configured server
      ansible.builtin.command:
        cmd: "getent ahosts {{ item }}"
      loop: "{{ ntp_servers }}"
      register: ntp_probe
      changed_when: false
      failed_when: ntp_probe.rc != 0

    - name: Probe DNS resolution for each configured resolver
      ansible.builtin.command:
        cmd: "getent ahosts {{ inventory_hostname }}"
      register: dns_probe
      changed_when: false
      failed_when: false

    - name: Assert DNS resolves this host's inventory name
      ansible.builtin.assert:
        that:
          - dns_probe.rc == 0
        fail_msg: "DNS could not resolve {{ inventory_hostname }} — check resolver configuration."
        success_msg: "DNS resolves {{ inventory_hostname }}."
