---
# ============================================================================
# GATED Arkime database initialisation. This DROPS and recreates the Arkime
# indices, creates the admin user, and installs ILM. It must run exactly once,
# after Elasticsearch is healthy and before the recorders start capturing.
#
# AWX gates this playbook behind an approval node; on the CLI you must pass:
#   -e arkime_force_init=true
# ============================================================================

- name: Initialise the Arkime database (gated, destructive)
  hosts: arkime_recorders
  become: true
  gather_facts: true
  tags:
    - arkime-init
  pre_tasks:
    - name: Assert the destructive Arkime init is explicitly requested
      ansible.builtin.assert:
        that:
          - arkime_force_init | bool
        fail_msg: >-
          REFUSING to initialise the Arkime database. This drops and recreates the
          Arkime indices. Re-run with -e arkime_force_init=true (AWX gates this behind
          an approval node).
        success_msg: "arkime_force_init=true — proceeding with the gated DB init flow."
      run_once: true
  roles:
    # db.pl runs in a container on the recorder, so the host needs Docker + the
    # Arkime image before init. Preparing it here lets init run before the
    # recorders' capture/viewer (whose viewer needs the DB to be healthy).
    - common
    - docker_engine
  tasks:
    - name: Run the gated Arkime database initialisation tasks
      ansible.builtin.include_role:
        name: arkime_recorder
        tasks_from: init.yml
