---
# ============================================================================
# Deploy the Arkime recorder tier: base OS hardening, Docker engine, then the
# capture + viewer Compose project. Run AFTER initialize_arkime.yml has seeded
# the database. Idempotent on re-run.
# ============================================================================

- name: Deploy the Arkime recorders (capture and viewer)
  hosts: arkime_recorders
  become: true
  gather_facts: true
  tags:
    - common
    - docker
    - recorders
  roles:
    - common
    - docker_engine
    - arkime_recorder
