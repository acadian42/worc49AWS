---
# ============================================================================
# LAB-ONLY: deploy a throwaway OpenLDAP directory on the recorder so the
# nginx-ldap-auth sidecar has a backend, keeping the E2E test to two VMs.
# Gated on fpc_lab — refuses to run against production. NOT production logic.
# ============================================================================

- name: Deploy the lab-only OpenLDAP test directory (E2E)
  hosts: arkime_recorders
  become: true
  gather_facts: false
  tags:
    - lab-ldap
  tasks:
    - name: Refuse to run outside a lab
      ansible.builtin.assert:
        that:
          - fpc_lab | default(false) | bool
        fail_msg: "e2e_lab_ldap is lab-only; refusing because fpc_lab is not true."
        success_msg: "fpc_lab is true — deploying the lab OpenLDAP test directory."

    - name: Run the lab OpenLDAP container (seeded with a test user)
      community.docker.docker_container:
        name: fpc-e2e-ldap
        image: "{{ lab_ldap_image | default('bitnami/openldap:2.6') }}"
        state: started
        pull: true
        restart_policy: unless-stopped
        network_mode: host
        env:
          LDAP_ROOT: "{{ ldap_base_dn }}"
          LDAP_ADMIN_USERNAME: "admin"
          LDAP_ADMIN_PASSWORD: "{{ ldap_bind_password }}"
          LDAP_PORT_NUMBER: "1389"
          LDAP_USERS: "{{ lab_ldap_user }}"
          LDAP_PASSWORDS: "{{ lab_ldap_user_password }}"
        log_driver: "{{ docker_log_driver }}"
      no_log: true

    - name: Wait for the lab LDAP to accept connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 1389
        timeout: 60

    - name: Seed a clean login user directly under the base DN
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          cat <<'LDIF' | docker exec -i fpc-e2e-ldap ldapadd -c -x \
            -H ldap://127.0.0.1:1389 -D "cn=admin,{{ ldap_base_dn }}" -w "{{ ldap_bind_password }}"
          dn: uid={{ lab_ldap_login_user }},{{ ldap_base_dn }}
          objectClass: inetOrgPerson
          objectClass: top
          uid: {{ lab_ldap_login_user }}
          cn: {{ lab_ldap_login_user }}
          sn: E2E
          userPassword: {{ lab_ldap_login_password }}
          LDIF
        executable: /bin/bash
      register: lab_ldap_seed
      # A freshly-started OpenLDAP opens the port before slapd accepts binds and
      # before the base DN is seeded; retry until the add succeeds or already exists.
      until: lab_ldap_seed.rc in [0, 68]
      retries: 15
      delay: 5
      changed_when: "'adding new entry' in lab_ldap_seed.stdout"
      failed_when: lab_ldap_seed.rc not in [0, 68]
      no_log: true
