# Ansible configuration for the FPC Arkime 6 production build.
# Production inventory is gitignored (hosts.yml); copy hosts.example.yml to start.
[defaults]
inventory = inventories/production/hosts.yml
roles_path = roles
collections_path = collections
host_key_checking = True
retry_files_enabled = False
stdout_callback = yaml
callbacks_enabled = profile_tasks
forks = 10
timeout = 30
interpreter_python = auto_silent
display_skipped_hosts = False
force_valid_group_names = ignore

[privilege_escalation]
# become is enabled per-play (not globally) so read-only plays run unprivileged.
become = False
become_method = sudo
become_user = root

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey
