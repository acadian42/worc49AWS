---
# Packages installed for Docker CE and the Compose v2 plugin (Debian family).
docker_apt_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Equivalent package set for the RedHat family.
docker_dnf_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Users to add to the docker group for non-root socket access.
docker_users:
  - "{{ ansible_user | default('ansible') }}"

# Control-node directory holding *.tar.gz images to ship in load_from_archive mode.
image_archive_src: "{{ playbook_dir }}/../images"

# Docker CE apt repository (Debian family).
docker_apt_gpg_url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
docker_apt_repo_url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}"

# Docker CE dnf repository (RedHat family).
docker_dnf_repo_baseurl: "https://download.docker.com/linux/centos/$releasever/$basearch/stable"
docker_dnf_repo_gpgkey: "https://download.docker.com/linux/centos/gpg"
