---
# ============================================================================
# Installs and pins Docker CE + the Compose v2 plugin, configures daemon.json,
# and delivers the digest-pinned FPC container images (archive or registry).
# ============================================================================

- name: Install Docker CE on Debian-family hosts
  ansible.builtin.include_tasks: install_debian.yml
  when: ansible_os_family == 'Debian'

- name: Install Docker CE on RedHat-family hosts
  ansible.builtin.include_tasks: install_redhat.yml
  when: ansible_os_family == 'RedHat'

- name: Ensure the Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add the configured users to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  loop_control:
    label: "{{ item }}"

- name: Query the installed Compose v2 plugin version
  ansible.builtin.command: docker compose version --short
  register: docker_compose_version
  changed_when: false

- name: Assert the Compose v2 plugin meets the minimum version
  ansible.builtin.assert:
    that:
      - docker_compose_version.stdout is version(docker_compose_min_version, '>=')
    fail_msg: >-
      Docker Compose plugin {{ docker_compose_version.stdout }} is older than the
      required {{ docker_compose_min_version }}.
    success_msg: "Docker Compose plugin {{ docker_compose_version.stdout }} satisfies >= {{ docker_compose_min_version }}"

- name: Ensure the Docker configuration directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render the Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Apply pending Docker daemon changes before delivering images
  ansible.builtin.meta: flush_handlers

- name: Deliver the FPC container images to this host
  ansible.builtin.include_tasks: deliver_images.yml
