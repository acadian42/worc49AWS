---
# Install Docker CE from the official Docker apt repository (Debian/Ubuntu).

- name: Install prerequisite packages for the Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - python3-debian      # required by ansible.builtin.deb822_repository
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure the apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add the Docker apt GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Add the Docker CE apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "{{ docker_apt_repo_url }}"
    suites: "{{ ansible_distribution_release }}"
    components: [stable]
    architectures: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
    enabled: true

- name: Install Docker CE and the Compose v2 plugin
  ansible.builtin.apt:
    name: "{{ docker_apt_packages }}"
    state: present
    update_cache: true
