---
# ============================================================================
# Elasticsearch cluster assertions. All probes hit this host's first node over
# TLS using the bootstrap superuser, validated against the node's shipped CA.
# Cluster-wide assertions are gated with run_once so they fire exactly once.
# ============================================================================

- name: Resolve this host's first node name, API scheme, and CA path
  ansible.builtin.set_fact:
    validation_es_first_node: "{{ physical_host }}-node-01"
    validation_es_scheme: "{{ 'https' if es_http_tls | bool else 'http' }}"
    validation_es_ca_path: "{{ es_config_path }}/{{ physical_host }}-node-01/certs/ca.crt.pem"

- name: Query the cluster health endpoint
  ansible.builtin.uri:
    url: "{{ validation_es_scheme }}://{{ management_ip }}:{{ es_http_base_port }}/_cluster/health"
    method: GET
    user: elastic
    password: "{{ es_bootstrap_password }}"
    force_basic_auth: true
    validate_certs: "{{ es_http_tls and not (air_gapped | default(false)) }}"
    ca_path: "{{ validation_es_ca_path if es_http_tls | bool else omit }}"
    return_content: true
    timeout: "{{ validation_http_timeout | int }}"
    status_code: [200]
  register: validation_es_health
  run_once: true
  no_log: true

- name: Assert the cluster is green with the expected node count
  ansible.builtin.assert:
    that:
      - validation_es_health.json.status == validation_required_health
      - (validation_es_health.json.number_of_nodes | int) == (validation_expected_es_nodes | int)
    fail_msg: >-
      Cluster health is '{{ validation_es_health.json.status }}' with
      {{ validation_es_health.json.number_of_nodes }} nodes
      (expected '{{ validation_required_health }}' and {{ validation_expected_es_nodes }} nodes).
    success_msg: >-
      Cluster green with {{ validation_es_health.json.number_of_nodes }} nodes.
  run_once: true

- name: Assert there are no unassigned shards
  ansible.builtin.assert:
    that:
      - (validation_es_health.json.unassigned_shards | int) == 0
    fail_msg: "{{ validation_es_health.json.unassigned_shards }} unassigned shard(s) present."
    success_msg: "All shards are assigned."
  run_once: true

- name: Query full node metadata for awareness attributes
  ansible.builtin.uri:
    url: "{{ validation_es_scheme }}://{{ management_ip }}:{{ es_http_base_port }}/_nodes"
    method: GET
    user: elastic
    password: "{{ es_bootstrap_password }}"
    force_basic_auth: true
    validate_certs: "{{ es_http_tls and not (air_gapped | default(false)) }}"
    ca_path: "{{ validation_es_ca_path if es_http_tls | bool else omit }}"
    timeout: "{{ validation_http_timeout | int }}"
    status_code: [200]
  register: validation_es_nodes
  run_once: true
  no_log: true

- name: Assert every node advertises the failure-domain awareness attribute
  ansible.builtin.assert:
    that:
      - validation_es_nodes.json.nodes.values()
        | map(attribute='attributes')
        | map('default', {}, true)
        | selectattr(es_awareness_attribute, 'undefined')
        | list | length == 0
    fail_msg: >-
      One or more nodes is missing node.attr.{{ es_awareness_attribute }}.
    success_msg: "All nodes advertise node.attr.{{ es_awareness_attribute }}."
  run_once: true

- name: Assert the master-eligible node count matches the expected master count
  ansible.builtin.assert:
    that:
      - (validation_es_nodes.json.nodes.values() | selectattr('roles', 'contains', 'master') | list | length)
        == (validation_expected_masters | int)
    fail_msg: >-
      Found {{ validation_es_nodes.json.nodes.values() | selectattr('roles', 'contains', 'master') | list | length }}
      master-eligible node(s) (expected {{ validation_expected_masters }}).
    success_msg: "{{ validation_expected_masters }} master-eligible node(s) present."
  run_once: true

- name: Query the shard allocation table via the cat API
  ansible.builtin.uri:
    url: "{{ validation_es_scheme }}://{{ management_ip }}:{{ es_http_base_port }}/_cat/shards?h=index,shard,prirep,node&format=json"
    method: GET
    user: elastic
    password: "{{ es_bootstrap_password }}"
    force_basic_auth: true
    validate_certs: "{{ es_http_tls and not (air_gapped | default(false)) }}"
    ca_path: "{{ validation_es_ca_path if es_http_tls | bool else omit }}"
    timeout: "{{ validation_http_timeout | int }}"
    status_code: [200]
  register: validation_es_shards
  run_once: true
  no_log: true

- name: Compute the set of index/shard/physical-host triples (best effort)
  ansible.builtin.set_fact:
    validation_shard_keys: >-
      {{ validation_es_shards.json
         | selectattr('node', 'defined')
         | rejectattr('node', 'equalto', '')
         | map('combine', {})
         | json_query("[].[index, to_string(shard), node]")
         | map('join', '|')
         | map('regex_replace', '-node-[0-9]+$', '')
         | list }}
  run_once: true
  when: (groups['elasticsearch_physical_hosts'] | length) > 1

- name: Assert no index/shard places two copies on the same physical host (best effort)
  ansible.builtin.assert:
    that:
      - (validation_shard_keys | length) == (validation_shard_keys | unique | length)
    fail_msg: >-
      At least one index/shard has two copies on a single physical host
      — failure-domain awareness may not be enforced. Review _cat/shards manually.
    success_msg: "No index/shard colocates copies on one physical host (best effort)."
  run_once: true
  # Meaningless with a single failure domain (the smoke topology): some indices
  # carry replicas that necessarily share the one host. Only enforce with 2+ hosts.
  when: (groups['elasticsearch_physical_hosts'] | length) > 1
