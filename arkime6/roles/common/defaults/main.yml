---
# ============================================================================
# common role defaults — base OS hardening, time sync, sysctl, ulimits, PKI
# trust. Tunables here have safe fallbacks to the global variable contract.
# ============================================================================

# Packages installed on every FPC host.
common_packages:
  - chrony
  - curl
  - ca-certificates
  - gnupg
  - python3

# chrony main config path differs by OS family.
chrony_conf_path: "{{ '/etc/chrony/chrony.conf' if ansible_os_family == 'Debian' else '/etc/chrony.conf' }}"

# Base sysctl applied on all hosts (ES needs high map count; low swappiness).
common_sysctl_base:
  vm.max_map_count: "{{ es_vm_max_map_count | default(262144) }}"
  vm.swappiness: "{{ es_vm_swappiness | default(1) }}"
  fs.file-max: 1048576

# Extra sysctl applied only on packet-capture (recorder) hosts.
common_sysctl_capture:
  net.core.rmem_max: 134217728
  net.core.wmem_max: 134217728
  net.core.netdev_max_backlog: 250000

# Users that receive the raised memlock/nofile limits.
common_limits_users:
  - root
  - "{{ ansible_user | default('ansible') }}"

# Open-file limit (soft and hard) for the above users.
common_nofile: "{{ es_ulimit_nofile | default(65536) }}"
