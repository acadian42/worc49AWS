---
- name: Restart chrony
  ansible.builtin.service:
    name: "{{ 'chrony' if ansible_os_family == 'Debian' else 'chronyd' }}"
    state: restarted

- name: Update ca trust
  ansible.builtin.command: "{{ 'update-ca-certificates' if ansible_os_family == 'Debian' else 'update-ca-trust' }}"
  changed_when: true
