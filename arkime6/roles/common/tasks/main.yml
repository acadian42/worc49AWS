---
# ============================================================================
# Base host preparation: validate OS, install packages, sync time, apply
# kernel tunables and ulimits, disable swap on ES hosts, then optionally set up
# the host firewall and the internal CA trust.
# ============================================================================

- name: Assert this host runs a supported distribution
  ansible.builtin.assert:
    that:
      - ansible_distribution in (supported_os_matrix | map(attribute='distribution') | list)
    fail_msg: >-
      {{ ansible_distribution }} is not in the supported OS matrix
      ({{ supported_os_matrix | map(attribute='distribution') | join(', ') }}).
    success_msg: "{{ ansible_distribution }} {{ ansible_distribution_version }} is supported."

- name: Refresh the APT package cache before installing (Debian)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install the common base packages
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present

- name: Render the chrony configuration
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ chrony_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony

- name: Apply the base kernel tunables
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
    sysctl_file: /etc/sysctl.d/99-fpc.conf
    state: present
  loop: "{{ common_sysctl_base | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Apply the packet-capture kernel tunables on recorder hosts
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
    sysctl_file: /etc/sysctl.d/99-fpc.conf
    state: present
  loop: "{{ common_sysctl_capture | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: "'arkime_recorders' in group_names"

- name: Render the security limits drop-in
  ansible.builtin.template:
    src: limits.conf.j2
    dest: /etc/security/limits.d/99-fpc.conf
    owner: root
    group: root
    mode: "0644"

- name: Disable swap at runtime on Elasticsearch hosts
  ansible.builtin.command: swapoff -a
  changed_when: false
  when: "'elasticsearch_physical_hosts' in group_names"

- name: Comment out swap entries in fstab on Elasticsearch hosts
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'
  when: "'elasticsearch_physical_hosts' in group_names"

- name: Configure the host firewall
  ansible.builtin.include_tasks: firewall.yml
  when: firewall_enabled | bool

- name: Set up the internal CA and host trust
  ansible.builtin.include_tasks: pki.yml
  when: internal_ca_enabled | bool
