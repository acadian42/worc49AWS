---
# ============================================================================
# Internal CA bootstrap. The CA is created exactly once on the control node
# under {{ playbook_dir }}/../pki, then its public certificate is distributed
# to every host's trust store. Other roles sign server/node certificates with
# this CA via the ownca provider.
# ============================================================================

- name: Set the local PKI directory path
  ansible.builtin.set_fact:
    pki_local_dir: "{{ playbook_dir }}/../pki"

- name: Create the local PKI directory on the control node
  ansible.builtin.file:
    path: "{{ pki_local_dir }}"
    state: directory
    mode: "0700"
  run_once: true
  delegate_to: localhost
  become: false

- name: Generate the internal CA private key
  community.crypto.openssl_privatekey:
    path: "{{ pki_local_dir }}/ca.key.pem"
    type: RSA
    size: 4096
    passphrase: "{{ internal_ca_key_passphrase if internal_ca_key_passphrase != '' else omit }}"
    cipher: "{{ 'auto' if internal_ca_key_passphrase != '' else omit }}"
    mode: "0600"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true

- name: Generate the internal CA signing request
  community.crypto.openssl_csr:
    path: "{{ pki_local_dir }}/ca.csr"
    privatekey_path: "{{ pki_local_dir }}/ca.key.pem"
    privatekey_passphrase: "{{ internal_ca_key_passphrase if internal_ca_key_passphrase != '' else omit }}"
    common_name: "{{ internal_ca_cn }}"
    basic_constraints:
      - "CA:TRUE"
    basic_constraints_critical: true
    key_usage:
      - keyCertSign
      - cRLSign
    key_usage_critical: true
    mode: "0600"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true

- name: Self-sign the internal CA certificate
  community.crypto.x509_certificate:
    path: "{{ pki_local_dir }}/ca.crt.pem"
    csr_path: "{{ pki_local_dir }}/ca.csr"
    privatekey_path: "{{ pki_local_dir }}/ca.key.pem"
    privatekey_passphrase: "{{ internal_ca_key_passphrase if internal_ca_key_passphrase != '' else omit }}"
    provider: selfsigned
    selfsigned_not_after: "+{{ tls_cert_validity_days }}d"
    mode: "0644"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true

- name: Install the internal CA certificate into the Debian trust store
  ansible.builtin.copy:
    src: "{{ pki_local_dir }}/ca.crt.pem"
    dest: /usr/local/share/ca-certificates/fpc-internal-ca.crt
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == 'Debian'
  notify: Update ca trust

- name: Install the internal CA certificate into the RHEL trust store
  ansible.builtin.copy:
    src: "{{ pki_local_dir }}/ca.crt.pem"
    dest: /etc/pki/ca-trust/source/anchors/fpc-internal-ca.crt
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == 'RedHat'
  notify: Update ca trust
