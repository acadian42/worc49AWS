---
# ============================================================================
# Derives the per-host ES node layout from elasticsearch_nodes_per_host, renders
# per-node config/heap/TLS, brings up the per-host Compose project, gates health,
# and finalizes the bootstrap guard. Containers are derived here, not in inventory.
# ============================================================================

- name: Compute Elasticsearch memory sizing from this host's RAM
  ansible.builtin.set_fact:
    es_host_ram_gib: "{{ (ansible_memtotal_mb / 1024) | round(0, 'floor') | int }}"
- name: Compute usable, per-container limit, and heap
  ansible.builtin.set_fact:
    es_usable_gib: "{{ (es_host_ram_gib | int) - (os_docker_reserve_gib | int) }}"
- name: Compute per-container memory limit
  ansible.builtin.set_fact:
    es_container_limit_gib: "{{ ((es_usable_gib | int) / (elasticsearch_nodes_per_host | int)) | round(0, 'floor') | int }}"
- name: Compute per-node JVM heap (50% of limit, capped, min 1 GiB)
  ansible.builtin.set_fact:
    es_node_heap_gib: >-
      {{ [[((es_container_limit_gib | int) * (es_heap_fraction | float)) | round(0, 'floor') | int,
           es_heap_max_gib | int] | min, 1] | max }}

- name: Assert there is enough RAM for the requested node density
  ansible.builtin.assert:
    that:
      - (es_container_limit_gib | int) >= (es_min_container_gib | int)
    fail_msg: >-
      Only {{ es_container_limit_gib }} GiB/container at N={{ elasticsearch_nodes_per_host }}
      on a {{ es_host_ram_gib }} GiB host — too small. Reduce elasticsearch_nodes_per_host.
    success_msg: "Per-container limit {{ es_container_limit_gib }} GiB, heap {{ es_node_heap_gib }} GiB"

- name: Build the cluster-wide seed hosts and initial master names
  ansible.builtin.set_fact:
    es_seed_hosts: >-
      {{ es_master_eligible_hosts
         | map('extract', hostvars, 'management_ip')
         | map('regex_replace', '$', ':' ~ es_transport_base_port) | list }}
    es_initial_master_names: >-
      {{ es_master_eligible_hosts | map('regex_replace', '$', '-node-01') | list }}

- name: Build the per-host node definitions
  ansible.builtin.set_fact:
    es_node_defs: >-
      {{ es_node_defs | default([]) + [{
        'name': physical_host ~ '-node-' ~ ('%02d' | format(item)),
        'node_index': item,
        'http_port': (es_http_base_port | int) + item - 1,
        'transport_port': (es_transport_base_port | int) + item - 1,
        'master_eligible': (physical_host in es_master_eligible_hosts and item == 1),
        'roles': (
          ['master'] if (physical_host in es_master_eligible_hosts and item == 1 and es_dedicated_masters)
          else (['master', 'data', 'data_content', 'ingest', 'remote_cluster_client']
                if (physical_host in es_master_eligible_hosts and item == 1)
                else ['data', 'data_content', 'ingest', 'remote_cluster_client'])),
        'heap_gib': (es_master_heap_gib | int
          if (physical_host in es_master_eligible_hosts and item == 1 and es_dedicated_masters)
          else es_node_heap_gib | int),
        'mem_limit_gib': (es_master_mem_gib | int
          if (physical_host in es_master_eligible_hosts and item == 1 and es_dedicated_masters)
          else es_container_limit_gib | int)
      }] }}
  loop: "{{ range(1, (elasticsearch_nodes_per_host | int) + 1) | list }}"

- name: Resolve the Elasticsearch HTTP API scheme
  ansible.builtin.set_fact:
    es_api_scheme: "{{ 'https' if es_http_tls | bool else 'http' }}"

- name: Detect whether this cluster has already been bootstrapped
  ansible.builtin.stat:
    path: "{{ es_bootstrap_marker }}"
  register: es_marker
- name: Set the bootstrapped flag
  ansible.builtin.set_fact:
    es_bootstrapped: "{{ es_marker.stat.exists }}"

- name: Create per-node directories
  ansible.builtin.file:
    path: "{{ item.0 }}/{{ item.1.name }}"
    state: directory
    owner: "{{ es_uid }}"
    group: "{{ es_gid }}"
    mode: "0755"
  loop: "{{ [es_data_path, es_logs_path, es_config_path] | product(es_node_defs) | list }}"

- name: Generate per-node TLS material
  ansible.builtin.include_tasks: certs.yml
  when: es_security_enabled | bool

- name: Render per-node elasticsearch.yml
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: "{{ es_config_path }}/{{ item.name }}/elasticsearch.yml"
    owner: "{{ es_uid }}"
    group: "{{ es_gid }}"
    mode: "0640"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart elasticsearch nodes

- name: Render per-node heap options
  ansible.builtin.template:
    src: heap.options.j2
    dest: "{{ es_config_path }}/{{ item.name }}/heap.options"
    owner: "{{ es_uid }}"
    group: "{{ es_gid }}"
    mode: "0640"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart elasticsearch nodes

- name: Render the per-host Compose project
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ es_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart elasticsearch nodes

- name: Bring up the Elasticsearch Compose project
  community.docker.docker_compose_v2:
    project_src: "{{ es_compose_dir }}"
    project_name: "{{ es_compose_project }}"
    state: present
    pull: never
    wait: true
  register: es_compose_up

- name: Flush handlers so node config changes are applied before health gating
  ansible.builtin.meta: flush_handlers

- name: Wait for this host's first node to answer the cluster health API
  ansible.builtin.uri:
    url: "{{ es_api_scheme }}://{{ management_ip }}:{{ es_http_base_port }}/_cluster/health?wait_for_status={{ es_health_min_status }}&timeout=30s"
    method: GET
    user: elastic
    password: "{{ es_bootstrap_password }}"
    force_basic_auth: true
    validate_certs: "{{ es_http_tls | bool and not (air_gapped | default(false)) }}"
    ca_path: "{{ (es_config_path ~ '/' ~ es_node_defs[0].name ~ '/certs/ca.crt.pem') if es_http_tls | bool else omit }}"
    status_code: [200]
  register: es_health
  until: es_health.status == 200 and es_health.json.status in ['green', es_health_min_status]
  retries: "{{ es_health_retries }}"
  delay: "{{ es_health_delay }}"
  no_log: true

- name: Apply cluster-wide allocation awareness (run once)
  ansible.builtin.uri:
    url: "{{ es_api_scheme }}://{{ management_ip }}:{{ es_http_base_port }}/_cluster/settings"
    method: PUT
    user: elastic
    password: "{{ es_bootstrap_password }}"
    force_basic_auth: true
    validate_certs: "{{ es_http_tls | bool and not (air_gapped | default(false)) }}"
    ca_path: "{{ (es_config_path ~ '/' ~ es_node_defs[0].name ~ '/certs/ca.crt.pem') if es_http_tls | bool else omit }}"
    body_format: json
    body:
      persistent:
        cluster.routing.allocation.awareness.attributes: "{{ es_awareness_attribute }}"
        cluster.routing.allocation.awareness.force.{{ es_awareness_attribute }}.values: "{{ es_awareness_force_values }}"
        cluster.routing.allocation.disk.watermark.low: "{{ es_disk_watermark_low }}"
        cluster.routing.allocation.disk.watermark.high: "{{ es_disk_watermark_high }}"
        cluster.routing.allocation.disk.watermark.flood_stage: "{{ es_disk_watermark_flood }}"
    status_code: [200]
  run_once: true
  when: es_apply_cluster_settings | bool
  no_log: true

- name: Provision the Arkime Elasticsearch role and user
  ansible.builtin.include_tasks: es_security.yml
  when:
    - es_security_enabled | bool
    - (es_arkime_writer_password | default('')) | length > 0

- name: Finalize the bootstrap guard (remove initial_master_nodes, write marker)
  ansible.builtin.include_tasks: finalize_bootstrap.yml
  when: not es_bootstrapped
