---
# Generate CA-signed per-node certificates on the control node, then ship them.
# The internal CA is created once by the common role (pki.yml) under {{ pki_local_dir }}.
- name: Set local PKI paths
  ansible.builtin.set_fact:
    pki_local_dir: "{{ playbook_dir }}/../pki"
    es_cert_local_dir: "{{ playbook_dir }}/../pki/es/{{ physical_host }}"

- name: Create the local per-host certificate directory
  ansible.builtin.file:
    path: "{{ es_cert_local_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate per-node private keys
  community.crypto.openssl_privatekey:
    path: "{{ es_cert_local_dir }}/{{ item.name }}.key.pem"
    type: RSA
    size: 2048
    mode: "0600"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false

- name: Generate per-node CSRs with correct SANs
  community.crypto.openssl_csr:
    path: "{{ es_cert_local_dir }}/{{ item.name }}.csr"
    privatekey_path: "{{ es_cert_local_dir }}/{{ item.name }}.key.pem"
    common_name: "{{ item.name }}"
    subject_alt_name:
      - "DNS:{{ item.name }}"
      - "DNS:{{ ansible_fqdn }}"
      - "DNS:{{ physical_host }}"
      - "DNS:localhost"
      - "IP:{{ management_ip }}"
      - "IP:127.0.0.1"
    mode: "0600"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false

- name: Sign per-node certificates with the internal CA
  community.crypto.x509_certificate:
    path: "{{ es_cert_local_dir }}/{{ item.name }}.crt.pem"
    csr_path: "{{ es_cert_local_dir }}/{{ item.name }}.csr"
    provider: ownca
    ownca_path: "{{ pki_local_dir }}/ca.crt.pem"
    ownca_privatekey_path: "{{ pki_local_dir }}/ca.key.pem"
    ownca_privatekey_passphrase: "{{ internal_ca_key_passphrase if (internal_ca_key_passphrase | default('')) != '' else omit }}"
    ownca_not_after: "+{{ tls_cert_validity_days }}d"
    mode: "0644"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Create the per-node certs directory on the host
  ansible.builtin.file:
    path: "{{ es_config_path }}/{{ item.name }}/certs"
    state: directory
    owner: "{{ es_uid }}"
    group: "{{ es_gid }}"
    mode: "0750"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ship the CA certificate to each node
  ansible.builtin.copy:
    src: "{{ pki_local_dir }}/ca.crt.pem"
    dest: "{{ es_config_path }}/{{ item.name }}/certs/ca.crt.pem"
    owner: "{{ es_uid }}"
    group: "{{ es_gid }}"
    mode: "0644"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart elasticsearch nodes

- name: Ship per-node certificate
  ansible.builtin.copy:
    src: "{{ es_cert_local_dir }}/{{ item.name }}.crt.pem"
    dest: "{{ es_config_path }}/{{ item.name }}/certs/node.crt.pem"
    owner: "{{ es_uid }}"
    group: "{{ es_gid }}"
    mode: "0644"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart elasticsearch nodes

- name: Ship per-node private key
  ansible.builtin.copy:
    src: "{{ es_cert_local_dir }}/{{ item.name }}.key.pem"
    dest: "{{ es_config_path }}/{{ item.name }}/certs/node.key.pem"
    owner: "{{ es_uid }}"
    group: "{{ es_gid }}"
    mode: "0640"
  loop: "{{ es_node_defs }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  notify: Restart elasticsearch nodes
