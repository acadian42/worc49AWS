---
# ============================================================================
# Deploy Arkime 6 Capture + Viewer as the fpc-arkime Compose project.
# Creates the on-disk tree, ships the internal CA so the cluster TLS is trusted,
# tunes the capture NIC (offloads/promisc, persisted via a oneshot unit), renders
# config.ini + the Compose file, and brings the project up. DB init is GATED and
# lives in init.yml — it is never run from here.
# ============================================================================

- name: Create the Arkime data and config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "{{ arkime_dir_mode }}"
  loop:
    - "{{ arkime_config_path }}"
    - "{{ arkime_pcap_path }}"
    - "{{ arkime_logs_path }}"
    - "{{ arkime_etc_path }}"
    - "{{ arkime_tls_path }}"

- name: Ship the internal CA bundle so Arkime trusts the Elasticsearch TLS
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../pki/ca.crt.pem"
    dest: "{{ arkime_ca_host_path }}"
    owner: root
    group: root
    mode: "0644"
  when: arkime_es_scheme == 'https'
  notify: Recreate arkime services

- name: Tune the capture NIC (offloads/promisc) when requested
  ansible.builtin.include_tasks: nic_tuning.yml
  when: capture_disable_offloads | bool or capture_promisc | bool

- name: Render the Arkime config.ini
  ansible.builtin.template:
    src: config.ini.j2
    dest: "{{ arkime_config_path }}/config.ini"
    owner: root
    group: root
    mode: "0640"
  no_log: true
  notify: Recreate arkime services

- name: Render the Arkime Compose project
  ansible.builtin.template:
    src: arkime-compose.yml.j2
    dest: "{{ arkime_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: Recreate arkime services

- name: Bring up the Arkime Compose project
  community.docker.docker_compose_v2:
    project_src: "{{ arkime_compose_dir }}"
    project_name: "{{ arkime_compose_project }}"
    state: present
    pull: never
    wait: true
  register: arkime_compose_up
