---
# ============================================================================
# GATED Arkime database initialisation. DESTRUCTIVE when it runs `db.pl init`
# (drops/recreates the Arkime indices), so it is only meaningful behind
# arkime_force_init. Runs once, from the first recorder, against the first ES
# node. The CA mount/--cacert/caTrustFile are only used when the ES endpoint is
# https (arkime_es_scheme); for an http endpoint they are omitted (the CA is not
# shipped to the recorder by this gated flow).
# Arkime 6 requires the http(s):// scheme on the db.pl URL.
# ============================================================================

- name: Assert the gated init is explicitly enabled
  ansible.builtin.assert:
    that:
      - arkime_force_init | bool
    fail_msg: "Arkime DB init is gated: set arkime_force_init=true to run it (DESTRUCTIVE)."
    success_msg: "arkime_force_init is set — running the gated DB init flow."
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"

- name: Resolve the db.pl endpoint and TLS fragments
  ansible.builtin.set_fact:
    arkime_db_url: "{{ arkime_es_scheme }}://{{ arkime_es_endpoints[0] }}"
    arkime_ca_mount: "{{ ('-v ' ~ arkime_ca_host_path ~ ':' ~ arkime_container_catrust ~ ':ro ') if arkime_es_scheme == 'https' else '' }}"
    arkime_ca_arg: "{{ ('--cacert ' ~ arkime_container_catrust ~ ' ') if arkime_es_scheme == 'https' else '' }}"
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"

- name: Probe whether the Arkime database already exists
  ansible.builtin.command:
    cmd: >-
      docker run --rm {{ arkime_ca_mount }}{{ arkime_image }}
      /opt/arkime/db/db.pl --esuser {{ arkime_es_user }}:{{ arkime_es_password }}
      {{ arkime_ca_arg }}{{ arkime_db_url }} info
  register: arkime_db_info
  changed_when: false
  failed_when: false
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"
  no_log: true

# An initialised schema prints "DB Version: <n>" with a non-negative number; a
# fresh cluster prints "DB Version: -1" (or nothing). Match a digit right after
# the label so "-1" is treated as absent.
- name: Determine whether the Arkime database is already initialised
  ansible.builtin.set_fact:
    arkime_db_initialized: "{{ arkime_db_info.stdout | default('') is search('DB Version:\\s*[0-9]') }}"
  run_once: true

- name: Initialise the Arkime database (pipe INIT via stdin)
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      echo INIT | docker run --rm -i {{ arkime_ca_mount }}{{ arkime_image }}
      /opt/arkime/db/db.pl --esuser {{ arkime_es_user }}:{{ arkime_es_password }}
      {{ arkime_ca_arg }}{{ arkime_db_url }} init
    executable: /bin/bash
  register: arkime_db_init
  changed_when: arkime_db_init.rc == 0
  # Destructive: only when the schema is ABSENT, or an operator explicitly asks
  # for a reset. arkime_force_init is the safety gate that ALLOWS init at all;
  # it must not silently wipe an existing DB on every re-run (idempotence).
  when:
    - arkime_force_init | bool
    - (not arkime_db_initialized) or (arkime_reinit | default(false) | bool)
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"
  no_log: true

- name: Ensure the Arkime config directory exists for the bootstrap config
  ansible.builtin.file:
    path: "{{ arkime_config_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"

- name: Create a temporary config.ini for the admin bootstrap
  ansible.builtin.copy:
    dest: "{{ arkime_config_path }}/.init-config.ini"
    owner: root
    group: root
    mode: "0600"
    content: |
      [default]
      elasticsearch={{ arkime_es_url }}
      elasticsearchBasicAuth={{ (arkime_es_user ~ ':' ~ arkime_es_password) | b64encode }}
      {% if arkime_es_scheme == 'https' %}
      caTrustFile={{ arkime_container_catrust }}
      {% endif %}
      passwordSecret={{ arkime_password_secret }}
      serverSecret={{ arkime_server_secret }}
      httpRealm={{ arkime_http_realm }}
  register: arkime_init_config
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"
  no_log: true

- name: Create the Arkime admin user with a mounted config.ini
  ansible.builtin.command:
    cmd: >-
      docker run --rm
      -v {{ arkime_config_path }}/.init-config.ini:{{ arkime_container_config }}:ro
      {{ arkime_ca_mount }}{{ arkime_image }}
      /opt/arkime/bin/arkime_add_user.sh -c {{ arkime_container_config }}
      {{ arkime_admin_user }} "Arkime Administrator" {{ arkime_admin_password }}
      --admin --createOnly
  register: arkime_admin_create
  changed_when: arkime_admin_create.rc == 0
  failed_when: arkime_admin_create.rc not in [0, 1]
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"
  no_log: true

- name: Remove the temporary admin bootstrap config.ini
  ansible.builtin.file:
    path: "{{ arkime_config_path }}/.init-config.ini"
    state: absent
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"

- name: Install ILM by upgrading the Arkime database (pipe UPGRADE via stdin)
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      echo UPGRADE | docker run --rm -i {{ arkime_ca_mount }}{{ arkime_image }}
      /opt/arkime/db/db.pl --esuser {{ arkime_es_user }}:{{ arkime_es_password }}
      {{ arkime_ca_arg }}{{ arkime_db_url }} upgrade --ilm
    executable: /bin/bash
  register: arkime_db_upgrade
  changed_when: arkime_db_upgrade.rc == 0
  run_once: true
  delegate_to: "{{ groups['arkime_recorders'][0] }}"
  no_log: true
