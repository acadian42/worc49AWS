---
# ============================================================================
# Apply capture NIC tuning now and persist it across reboots.
# - promisc on (so the NIC sees all frames on the SPAN/tap)
# - disable hardware offloads (gro/lro/tso/gso) so Arkime sees real wire frames
# Live application uses idempotent ip/ethtool calls (changed_when false — they are
# convergent state-setters); persistence is a oneshot systemd unit re-applied on boot.
# ============================================================================

- name: Enable promiscuous mode on the capture interfaces
  ansible.builtin.command:
    cmd: "ip link set {{ item }} promisc on"
  loop: "{{ capture_interfaces }}"
  changed_when: false
  when: capture_promisc | bool

- name: Disable hardware offloads on the capture interfaces
  ansible.builtin.command:
    cmd: "ethtool -K {{ item }} gro off lro off tso off gso off"
  loop: "{{ capture_interfaces }}"
  changed_when: false
  failed_when: false
  when: capture_disable_offloads | bool

- name: Install the capture NIC tuning oneshot unit
  ansible.builtin.template:
    src: capture-nic.service.j2
    dest: /etc/systemd/system/capture-nic.service
    owner: root
    group: root
    mode: "0644"

- name: Enable the capture NIC tuning unit so settings persist across reboot
  ansible.builtin.systemd_service:
    name: capture-nic.service
    enabled: true
    state: started
    daemon_reload: true
