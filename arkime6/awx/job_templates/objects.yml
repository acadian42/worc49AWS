---
# ============================================================================
# AWX objects-as-code for the FPC Arkime build.
# Defines the organization, project, inventory + groups, credentials, custom
# credential types, and one job template per operational playbook.
# Apply with:  ansible-playbook awx/job_templates/objects.yml
# All controller connection + secret values are supplied at runtime as extra
# vars or environment (see the vars block placeholders). NEVER commit secrets.
# ============================================================================
- name: Provision FPC AWX organization, project, inventory and job templates
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    # ---- Controller connection (override via -e or AWX env at apply time) ----
    fpc_controller_host: "https://awx.example.com"
    fpc_controller_username: "admin"
    fpc_controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') }}"
    fpc_controller_validate_certs: true

    # ---- Naming -------------------------------------------------------------
    fpc_organization: "FPC Platform"
    fpc_project: "FPC Arkime Build"
    fpc_inventory: "FPC Production"
    fpc_scm_url: "https://git.example.com/fpc/fpc_production_build_arikme.git"
    fpc_scm_branch: "main"

    # ---- Credential references (objects created/managed elsewhere) ----------
    fpc_machine_credential: "FPC SSH Machine"
    fpc_ldap_credential_type: "FPC LDAP Bind"
    fpc_registry_credential_type: "FPC Container Registry"
    fpc_vault_credential: "FPC Ansible Vault"

    # Common module defaults so every awx.awx task shares the controller config.
    fpc_controller_defaults:
      controller_host: "{{ fpc_controller_host }}"
      controller_username: "{{ fpc_controller_username }}"
      controller_password: "{{ fpc_controller_password }}"
      validate_certs: "{{ fpc_controller_validate_certs }}"

    # ---- Job template catalogue (one per operational playbook) --------------
    # cluster_mutating flips allow_simultaneous to false.
    fpc_job_templates:
      - {name: "FPC Preflight", playbook: "playbooks/preflight.yml", cluster_mutating: false}
      - {name: "FPC Deploy Elasticsearch", playbook: "playbooks/deploy_elasticsearch.yml", cluster_mutating: true}
      - {name: "FPC Initialize Arkime", playbook: "playbooks/initialize_arkime.yml", cluster_mutating: true}
      - {name: "FPC Deploy Recorders", playbook: "playbooks/deploy_recorders.yml", cluster_mutating: true}
      - {name: "FPC Deploy Nginx", playbook: "playbooks/deploy_nginx.yml", cluster_mutating: true}
      - {name: "FPC Validate", playbook: "playbooks/validate.yml", cluster_mutating: false}
      - {name: "FPC Upgrade", playbook: "playbooks/upgrade.yml", cluster_mutating: true}
      - {name: "FPC Backup", playbook: "playbooks/backup.yml", cluster_mutating: false}
      - {name: "FPC Recover", playbook: "playbooks/recover.yml", cluster_mutating: true}

  module_defaults:
    group/awx.awx.controller: "{{ fpc_controller_defaults }}"

  tasks:
    - name: Create the FPC organization
      awx.awx.organization:
        name: "{{ fpc_organization }}"
        description: "Full-packet-capture Arkime platform"
        state: present

    - name: Create the LDAP bind custom credential type
      awx.awx.credential_type:
        name: "{{ fpc_ldap_credential_type }}"
        description: "LDAP bind DN and password injected as environment variables"
        kind: net
        inputs:
          fields:
            - id: bind_dn
              type: string
              label: "LDAP bind DN"
            - id: bind_password
              type: string
              label: "LDAP bind password"
              secret: true
          required:
            - bind_dn
            - bind_password
        injectors:
          env:
            FPC_LDAP_BIND_DN: "{{ '{{' }} bind_dn {{ '}}' }}"
            FPC_LDAP_BIND_PASSWORD: "{{ '{{' }} bind_password {{ '}}' }}"
        state: present

    - name: Create the container registry custom credential type
      awx.awx.credential_type:
        name: "{{ fpc_registry_credential_type }}"
        description: "Private container registry login injected as environment variables"
        kind: cloud
        inputs:
          fields:
            - id: registry_url
              type: string
              label: "Registry URL"
            - id: registry_username
              type: string
              label: "Registry username"
            - id: registry_password
              type: string
              label: "Registry password"
              secret: true
          required:
            - registry_url
            - registry_username
            - registry_password
        injectors:
          env:
            FPC_REGISTRY_URL: "{{ '{{' }} registry_url {{ '}}' }}"
            FPC_REGISTRY_USERNAME: "{{ '{{' }} registry_username {{ '}}' }}"
            FPC_REGISTRY_PASSWORD: "{{ '{{' }} registry_password {{ '}}' }}"
        state: present

    - name: Create the FPC project from source control
      awx.awx.project:
        name: "{{ fpc_project }}"
        description: "Ansible roles and playbooks for the FPC Arkime build"
        organization: "{{ fpc_organization }}"
        scm_type: git
        scm_url: "{{ fpc_scm_url }}"
        scm_branch: "{{ fpc_scm_branch }}"
        scm_clean: true
        scm_update_on_launch: true
        scm_update_cache_timeout: 60
        state: present

    - name: Create the FPC inventory
      awx.awx.inventory:
        name: "{{ fpc_inventory }}"
        description: "Production Elasticsearch hosts and Arkime recorders"
        organization: "{{ fpc_organization }}"
        state: present

    - name: Create the Elasticsearch physical hosts group
      awx.awx.group:
        name: elasticsearch_physical_hosts
        description: "Physical hosts running N Elasticsearch containers each"
        inventory: "{{ fpc_inventory }}"
        state: present

    - name: Create the Arkime recorders group
      awx.awx.group:
        name: arkime_recorders
        description: "Arkime capture, viewer, and Nginx/LDAP front end hosts"
        inventory: "{{ fpc_inventory }}"
        state: present

    - name: Create the machine credential for target SSH access
      awx.awx.credential:
        name: "{{ fpc_machine_credential }}"
        description: "SSH machine credential for managed FPC hosts"
        organization: "{{ fpc_organization }}"
        credential_type: "Machine"
        state: present

    - name: Define the job template for each operational playbook
      awx.awx.job_template:
        name: "{{ item.name }}"
        description: "Runs {{ item.playbook }} against the FPC inventory"
        job_type: run
        organization: "{{ fpc_organization }}"
        inventory: "{{ fpc_inventory }}"
        project: "{{ fpc_project }}"
        playbook: "{{ item.playbook }}"
        ask_variables_on_launch: true
        allow_simultaneous: "{{ not (item.cluster_mutating | bool) }}"
        credentials:
          - "{{ fpc_machine_credential }}"
          - "{{ fpc_vault_credential }}"
        state: present
      loop: "{{ fpc_job_templates }}"
      loop_control:
        label: "{{ item.name }}"
