---
# ============================================================================
# Ansible Builder v3 execution-environment definition for the FPC Arkime build.
# Build with:  ansible-builder build -f awx/execution-environment.yml -t fpc-ee:latest
# Schema verified 2026-06-24 against ansible-builder 3.x docs.
# This file is an ansible-builder definition, NOT an Ansible playbook (not linted).
# ============================================================================
version: 3

images:
  base_image:
    # RPM-based EE base (ansible-builder requires an RPM image). UBI 9 is current.
    name: quay.io/ansible/awx-ee:24.6.1

dependencies:
  # The awx-ee:24.6.1 base ships Python 3.9, but ansible-core 2.21.1 (and the
  # pinned collections) require Python >= 3.12. Install and target 3.12 explicitly.
  python_interpreter:
    package_system: "python3.12"
    python_path: "/usr/bin/python3.12"
  ansible_core:
    package_pip: ansible-core==2.21.1
  ansible_runner:
    package_pip: ansible-runner
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt
  # The awx-ee base bundles many collections we do not use (ovirt, etc.) whose
  # Python deps require compilation and fail on py3.12. We don't need them.
  exclude:
    python:
      - ovirt-engine-sdk-python
      - ovirt-imageio

options:
  # The awx-ee base uses dnf (not microdnf).
  package_manager_path: /usr/bin/dnf
