---
# ============================================================================
# AWX workflow-as-code for the FPC Arkime build.
# Builds the 9-stage workflow with manual APPROVAL gates before the three
# cluster-mutating, high-risk stages: initialize_arkime, upgrade, recover.
# Apply AFTER awx/job_templates/objects.yml has created the job templates.
# Survey collects density and image digests at launch; no secrets here.
# ============================================================================
- name: Provision the FPC Arkime deployment workflow
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    fpc_controller_host: "https://awx.example.com"
    fpc_controller_username: "admin"
    fpc_controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') }}"
    fpc_controller_validate_certs: true

    fpc_organization: "FPC Platform"
    fpc_inventory: "FPC Production"
    fpc_workflow: "FPC Deploy Arkime Cluster"

    fpc_controller_defaults:
      controller_host: "{{ fpc_controller_host }}"
      controller_username: "{{ fpc_controller_username }}"
      controller_password: "{{ fpc_controller_password }}"
      validate_certs: "{{ fpc_controller_validate_certs }}"

    fpc_survey_spec:
      name: "FPC deployment survey"
      description: "Density and pinned image digests for this run"
      spec:
        - question_name: "Elasticsearch nodes per host"
          question_description: "Container density per physical host (benchmarked decision)"
          variable: elasticsearch_nodes_per_host
          type: multiplechoice
          choices:
            - "3"
            - "4"
            - "5"
          default: "3"
          required: true
        - question_name: "Arkime image digest"
          question_description: "sha256 digest to pin for the Arkime image"
          variable: arkime_image_digest
          type: text
          default: ""
          required: false
        - question_name: "Elasticsearch image digest"
          question_description: "sha256 digest to pin for the Elasticsearch image"
          variable: es_image_digest
          type: text
          default: ""
          required: false
        - question_name: "Confirm destructive actions"
          question_description: "Must be yes for recover/init to proceed"
          variable: confirm_destroy
          type: multiplechoice
          choices:
            - "yes"
            - "no"
          default: "no"
          required: true

  module_defaults:
    group/awx.awx.controller: "{{ fpc_controller_defaults }}"

  tasks:
    - name: Create the FPC deployment workflow job template
      awx.awx.workflow_job_template:
        name: "{{ fpc_workflow }}"
        description: "9-stage gated deployment of the FPC Arkime cluster"
        organization: "{{ fpc_organization }}"
        inventory: "{{ fpc_inventory }}"
        allow_simultaneous: false
        ask_variables_on_launch: true
        survey_enabled: true
        survey_spec: "{{ fpc_survey_spec }}"
        state: present

    - name: Stage 1 - preflight
      awx.awx.workflow_job_template_node:
        identifier: preflight
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Preflight"
        success_nodes:
          - deploy_elasticsearch
        state: present

    - name: Stage 2 - deploy Elasticsearch
      awx.awx.workflow_job_template_node:
        identifier: deploy_elasticsearch
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Deploy Elasticsearch"
        success_nodes:
          - approve_initialize_arkime
        state: present

    - name: Stage 3 gate - approval before initialize Arkime
      awx.awx.workflow_job_template_node:
        identifier: approve_initialize_arkime
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        approval_node:
          name: "Approve Arkime database initialization"
          description: "Manual gate: confirms ES is healthy before Arkime DB init"
          timeout: 86400
        success_nodes:
          - initialize_arkime
        state: present

    - name: Stage 3 - initialize Arkime
      awx.awx.workflow_job_template_node:
        identifier: initialize_arkime
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Initialize Arkime"
        success_nodes:
          - deploy_recorders
        state: present

    - name: Stage 4 - deploy recorders
      awx.awx.workflow_job_template_node:
        identifier: deploy_recorders
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Deploy Recorders"
        success_nodes:
          - deploy_nginx
        state: present

    - name: Stage 5 - deploy Nginx and LDAP front end
      awx.awx.workflow_job_template_node:
        identifier: deploy_nginx
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Deploy Nginx"
        success_nodes:
          - validate
        state: present

    - name: Stage 6 - validate
      awx.awx.workflow_job_template_node:
        identifier: validate
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Validate"
        success_nodes:
          - backup
        state: present

    - name: Stage 7 - backup
      awx.awx.workflow_job_template_node:
        identifier: backup
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Backup"
        success_nodes:
          - approve_upgrade
        state: present

    - name: Stage 8 gate - approval before upgrade
      awx.awx.workflow_job_template_node:
        identifier: approve_upgrade
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        approval_node:
          name: "Approve cluster upgrade"
          description: "Manual gate: confirms backup completed before rolling upgrade"
          timeout: 86400
        success_nodes:
          - upgrade
        state: present

    - name: Stage 8 - upgrade
      awx.awx.workflow_job_template_node:
        identifier: upgrade
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Upgrade"
        success_nodes:
          - approve_recover
        state: present

    - name: Stage 9 gate - approval before recover
      awx.awx.workflow_job_template_node:
        identifier: approve_recover
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        approval_node:
          name: "Approve disaster recovery"
          description: "Manual gate: destructive restore; requires confirm_destroy yes"
          timeout: 86400
        success_nodes:
          - recover
        state: present

    - name: Stage 9 - recover
      awx.awx.workflow_job_template_node:
        identifier: recover
        workflow_job_template: "{{ fpc_workflow }}"
        organization: "{{ fpc_organization }}"
        unified_job_template: "FPC Recover"
        state: present
